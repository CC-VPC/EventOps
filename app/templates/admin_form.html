{% extends 'base.html' %}
{% set active_page = 'admin' %}

{% block title %}Manage Event Details - EventOps{% endblock %}

{% block content %}
<div class="breadcrumb">
    <a href="/admin" class="btn-link"><i data-lucide="arrow-left"></i> Back to Console</a>
</div>

<div class="card" style="max-width: 800px; margin: 0 auto; box-shadow: var(--shadow-md);">
    <div class="card-header">
        <h2 id="form-title">Add New Event</h2>
        <p class="text-sm text-muted" id="form-subtitle">Enter the details of the event below.</p>
    </div>
    <div class="card-body">
        <div id="form-loader" class="list-loader" style="display: none; padding: 40px 0;">
            <span class="spinner"></span> Loading event details...
        </div>

        <div id="form-error-alert" class="seats-info" style="display: none; background-color: #fef2f2; color: #ef4444; margin-bottom: 24px;">
            <i data-lucide="alert-circle"></i>
            <span id="form-error-text"></span>
        </div>

        <form id="event-form" onsubmit="submitForm(event)">
            <div style="margin-bottom: 20px;">
                <label for="title" style="display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase;">Event Title *</label>
                <input type="text" id="title" required placeholder="e.g. annual robotics competition" class="search-input" style="padding-left: 16px; width: 100%; height: 44px; font-size: 1rem; border-radius: 8px;" />
            </div>

            <div style="margin-bottom: 20px;">
                <label for="description" style="display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase;">Description *</label>
                <textarea id="description" required placeholder="e.g. details about the tracks, speakers, and schedule..." class="search-input" style="padding: 12px 16px; width: 100%; height: 120px; font-size: 1rem; border-radius: 8px; font-family: inherit; resize: vertical;"></textarea>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                <div>
                    <label for="date" style="display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase;">Date *</label>
                    <input type="date" id="date" required class="search-input" style="padding-left: 16px; width: 100%; height: 44px; font-size: 1rem; border-radius: 8px;" />
                </div>
                <div>
                    <label for="time" style="display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase;">Time (HH:MM) *</label>
                    <input type="time" id="time" required class="search-input" style="padding-left: 16px; width: 100%; height: 44px; font-size: 1rem; border-radius: 8px;" />
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                <div>
                    <label for="venue" style="display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase;">Venue *</label>
                    <input type="text" id="venue" required placeholder="e.g. auditorium B" class="search-input" style="padding-left: 16px; width: 100%; height: 44px; font-size: 1rem; border-radius: 8px;" />
                </div>
                <div>
                    <label for="category" style="display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase;">Category *</label>
                    <select id="category" required class="search-input" style="padding-left: 12px; width: 100%; height: 44px; font-size: 1rem; border-radius: 8px; appearance: none; background-image: url('data:image/svg+xml;utf8,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;24&quot; height=&quot;24&quot; viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;%2364748b&quot; stroke-width=&quot;2&quot; stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot;><polyline points=&quot;6 9 12 15 18 9&quot;></polyline></svg>'); background-repeat: no-repeat; background-position: right 12px center; background-size: 16px;">
                        <option value="Technical">Technical</option>
                        <option value="Cultural">Cultural</option>
                        <option value="Sports">Sports</option>
                        <option value="Academic">Academic</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>

            <div style="margin-bottom: 30px;">
                <label for="max_attendees" style="display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase;">Max Capacity (Optional)</label>
                <input type="number" id="max_attendees" min="1" placeholder="Leave empty for open attendance" class="search-input" style="padding-left: 16px; width: 100%; height: 44px; font-size: 1rem; border-radius: 8px;" />
            </div>

            <div style="display: flex; justify-content: flex-end; gap: 12px; border-top: 1px solid var(--border-color); padding-top: 24px;">
                <a href="/admin" class="btn btn-outline">Cancel</a>
                <button type="submit" id="btn-submit" class="btn btn-primary">Save Event</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function getEventIdFromPath() {
        const parts = window.location.pathname.split('/');
        // /admin/events/edit/{id}
        const lastPart = parts[parts.length - 1];
        if (lastPart === 'new' || lastPart === 'events' || lastPart === 'edit') {
            return null;
        }
        return lastPart;
    }

    const eventId = getEventIdFromPath();
    const token = sessionStorage.getItem('adminVerified');

    document.addEventListener('DOMContentLoaded', () => {
        // Simple security redirect
        if (token !== 'true') {
            alert('Admin authorization required.');
            window.location.href = '/admin';
            return;
        }

        if (eventId) {
            // Edit mode setup
            document.getElementById('form-title').textContent = 'Edit Event Record';
            document.getElementById('form-subtitle').textContent = 'Modify the parameters of the existing event.';
            loadEventForEditing();
        }
    });

    function loadEventForEditing() {
        const form = document.getElementById('event-form');
        const loader = document.getElementById('form-loader');
        const errorAlert = document.getElementById('form-error-alert');
        const errorText = document.getElementById('form-error-text');

        form.style.display = 'none';
        loader.style.display = 'block';

        fetch(`/api/events/${eventId}`)
            .then(res => {
                if (!res.ok) throw new Error('Failed to load event record.');
                return res.json();
            })
            .then(evt => {
                document.getElementById('title').value = evt.title;
                document.getElementById('description').value = evt.description;
                document.getElementById('date').value = evt.date; // YYYY-MM-DD
                document.getElementById('time').value = evt.time; // HH:MM
                document.getElementById('venue').value = evt.venue;
                document.getElementById('category').value = evt.category;
                document.getElementById('max_attendees').value = evt.max_attendees || '';

                loader.style.display = 'none';
                form.style.display = 'block';
            })
            .catch(err => {
                loader.style.display = 'none';
                errorText.textContent = err.message;
                errorAlert.style.display = 'flex';
            });
    }

    function submitForm(e) {
        e.preventDefault();

        const errorAlert = document.getElementById('form-error-alert');
        const errorText = document.getElementById('form-error-text');
        const submitBtn = document.getElementById('btn-submit');

        errorAlert.style.display = 'none';

        const title = document.getElementById('title').value.trim();
        const description = document.getElementById('description').value.trim();
        const date = document.getElementById('date').value;
        const time = document.getElementById('time').value; // HH:MM
        const venue = document.getElementById('venue').value.trim();
        const category = document.getElementById('category').value;
        const maxVal = document.getElementById('max_attendees').value;

        // Validation
        if (!title || !description || !date || !time || !venue || !category) {
            errorText.textContent = 'Please fill out all required fields.';
            errorAlert.style.display = 'flex';
            return;
        }

        const payload = {
            title: title,
            description: description,
            date: date,
            time: time,
            venue: venue,
            category: category,
            max_attendees: maxVal ? parseInt(maxVal, 10) : null
        };

        const password = sessionStorage.getItem('adminPassword') || 'root';
        const url = eventId ? `/api/events/${eventId}` : '/api/events';
        const method = eventId ? 'PUT' : 'POST';

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner" style="border-top-color: white;"></span> Saving...';

        fetch(url, {
            method: method,
            headers: {
                'Content-Type': 'application/json',
                'X-Admin-Password': password
            },
            body: JSON.stringify(payload)
        })
        .then(async res => {
            if (res.ok) {
                alert(eventId ? 'Event updated successfully.' : 'Event created successfully.');
                window.location.href = '/admin';
            } else {
                const errData = await res.json().catch(() => ({}));
                const errMsg = errData.detail || 'Failed to save event. Ensure date is not in past and format is correct.';
                
                // If validation details is an array (FastAPI default)
                if (Array.isArray(errMsg)) {
                    throw new Error(errMsg.map(x => x.msg).join(', '));
                }
                
                throw new Error(typeof errMsg === 'string' ? errMsg : JSON.stringify(errMsg));
            }
        })
        .catch(err => {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Save Event';
            errorText.textContent = err.message;
            errorAlert.style.display = 'flex';
        });
    }
</script>
{% endblock %}
