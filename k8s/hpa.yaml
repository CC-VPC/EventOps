apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: eventapp-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: eventapp
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50    # scale up when avg CPU > 50%
