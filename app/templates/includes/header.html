<header class="app-header">
    <div class="header-left">
        <button id="sidebar-toggle" class="icon-btn mobile-only" aria-label="Toggle Menu">
            <i data-lucide="menu"></i>
        </button>
        <div class="header-search">
            <i data-lucide="search" class="search-icon"></i>
            <input type="text" placeholder="Search events..." class="search-input">
        </div>
    </div>
    <div class="header-right">
        <button class="icon-btn notification-btn" aria-label="Notifications">
            <i data-lucide="bell"></i>
            <span class="notification-badge"></span>
        </button>
        <div class="user-profile">
            <img src="https://ui-avatars.com/api/?name=Admin+User&background=6366f1&color=fff&rounded=true" alt="User Profile" class="avatar">
            <span class="user-name">Admin User</span>
            <i data-lucide="chevron-down" class="dropdown-icon"></i>
        </div>
    </div>
</header>
